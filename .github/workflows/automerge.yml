name: Auto-merge passing chapters to main

# TIDEMARK is written one chapter per scheduled run. The run happens on its own
# claude/** branch (the harness never lets it push straight to main), so this
# workflow is the bridge that lands finished chapters on main automatically.
#
# It plays the "git wrapper" role described in CLAUDE.md and honors BOTH signals
# a run can leave behind, so it stays correct no matter which one a given run
# uses:
#
#   1. Branch name. A run that FAILS its self-audit commits to a
#      claude/review-chNN branch for human review. Those are NEVER merged.
#   2. notes/.last_run. A run writes "AUDIT: PASS" or "AUDIT: FAIL" there.
#      An explicit FAIL is never merged.
#
# A push to any other claude/** branch with a passing (or absent) verdict is a
# finished chapter and gets fast-forwarded onto main.
on:
  push:
    branches:
      - 'claude/**'

# Allow the workflow to push the merge back to main.
permissions:
  contents: write

# Handle pushes one at a time so two runs can't race to move main.
concurrency:
  group: tidemark-automerge
  cancel-in-progress: false

jobs:
  merge-pass-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Land the chapter on main unless it was quarantined
        run: |
          set -euo pipefail

          # 1) Quarantine by branch name: review branches are for human eyes.
          case "${GITHUB_REF_NAME}" in
            claude/review-*|claude/review/*)
              echo "Branch ${GITHUB_REF_NAME} is a review/quarantine branch; not merging."
              exit 0
              ;;
          esac

          # 2) Quarantine by explicit FAIL verdict, if the run left one.
          if [ -f notes/.last_run ]; then
            STATUS="$(tr -d '[:space:]' < notes/.last_run)"
            echo "notes/.last_run = '${STATUS}'"
            if [ "${STATUS}" = "AUDIT:FAIL" ]; then
              echo "Self-audit recorded FAIL; leaving the draft on ${GITHUB_REF_NAME}."
              exit 0
            fi
          else
            echo "No notes/.last_run on this push; treating as passing."
          fi

          git config user.name "tidemark-automerge[bot]"
          git config user.email "tidemark-automerge@users.noreply.github.com"

          git fetch origin main
          git checkout -B main origin/main

          # A run branches from main and adds its commits on top, so a
          # fast-forward is the normal case. Fall back to a real merge only if
          # main moved underneath us (e.g. a manual commit on main).
          if git merge --ff-only "${GITHUB_SHA}"; then
            echo "Fast-forwarded main to ${GITHUB_SHA}."
          else
            git merge --no-edit "${GITHUB_SHA}"
            echo "main had diverged; created a merge commit."
          fi

          git push origin main
